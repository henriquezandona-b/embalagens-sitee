    function abrirDia() {

    }

const categoriasInventario = [

    function abrirInventario() {

    document.getElementById("btnExcel").style.display = "none";
    document.getElementById("btnDashboard").style.display = "none";

    document.getElementById("inicio").style.display = "none";
    document.getElementById("inventario").style.display = "block";

    let html = "";

    categoriasInventario.forEach((categoria, indiceCategoria) => {

       html += `
<h2 style="
    margin-top:60px;
    margin-bottom:25px;
    color:#173B70;
">
    ${categoria.categoria}
</h2>
`;

        categoria.itens.forEach((item, indiceItem) => {

            const id = `${indiceCategoria}_${indiceItem}`;

            html += `

            <div class="item">

                <label class="labelInventario">${item}</label>

                <input
    id="inv_${id}"
    type="tel"
    inputmode="numeric"
    placeholder="Ex: 2+4+6"
    oninput="calcularInventario('${id}')">

<div class="total">
    TOTAL
    <br>
    <span id="tinv_${id}">0</span>
</div>

            `;

        });

    });

    document.getElementById("camposInventario").innerHTML = html;

}
    function soma(valor) {
      if (!valor) return 0;

      return valor
        .split("+")
        .reduce((total, parte) => total + (Number(parte.trim()) || 0), 0);
    }

    function calcular(i) {
      const valor = soma(document.getElementById("c" + i).value);
      document.getElementById("t" + i).textContent = valor;
    }

    function calcularInventario(id){

    const total = soma(
        document.getElementById("inv_" + id).value
    );

    document.getElementById("tinv_" + id).textContent = total;

}

    function abrirNota() {
      document.getElementById("contagem").style.display = "none";
      document.getElementById("nota").style.display = "block";

      let html = "";

      dias[dia].campos.forEach((item, i) => {
        html += `
          <div class="item">
            <label for="n${i}">${item} - NOTA</label>
            <input id="n${i}" type="tel" inputmode="numeric" placeholder="Ex: 50+40+20" value="${notasSalvas[i] || ""}" oninput="calcularNota(${i})">
            <div class="total">
              TOTAL NOTA ${item}
              <br>
              <span id="tn${i}">${soma(notasSalvas[i] || "")}</span>
            </div>
          </div>
        `;
      });

      document.getElementById("camposNota").innerHTML = html;
    }

    function calcularNota(i) {
      const valor = document.getElementById("n" + i).value;
      const total = soma(valor);

      notasSalvas[i] = valor;

      const el = document.getElementById("tn" + i);
      if (el) el.textContent = total;
    }

    function montarDadosDia() {
      return dias[dia].campos.map((item, i) => {
        const contagemBruta = soma(document.getElementById("c" + i)?.value || "");
        const contagem = contagemBruta;
        const nota = soma(document.getElementById("n" + i)?.value || "");

        return {
          item,
          contagem,
          nota,
          diferenca: contagem - nota
        };
      });
    }

    function mostrarResumo() {
      dias[dia].campos.forEach((_, i) => {
        notasSalvas[i] = document.getElementById("n" + i).value;
      });

      document.getElementById("btnDashboard").style.display = "block";
      document.getElementById("btnExcel").style.display = "none";
     document.getElementById("inicio").style.display = "none";
document.getElementById("contagem").style.display = "none";
document.getElementById("nota").style.display = "none";
document.getElementById("resumo").style.display = "block";

      const dados = montarDadosDia();
      let html = "";

      dados.forEach(({ item, contagem, nota, diferenca }) => {
        const status = contagem === nota ? "✅ CONFERIDO" : "❌ DIVERGÊNCIA";

        html += `
          <div class="card">
            <b>${item}</b>
            <br><br>
            <h2>${status}</h2>
            Contagem: ${contagem}
            <br>
            Nota: ${nota}
            <br>
            Diferença: ${diferenca}
          </div>
        `;
      });

      document.getElementById("resultado").innerHTML = html;
    }

    function voltarContagem() {

    document.getElementById("btnDashboard").style.display = "none";
    document.getElementById("btnExcel").style.display = "none";

    document.getElementById("nota").style.display = "none";
    document.getElementById("resumo").style.display = "none";
    document.getElementById("contagem").style.display = "block";

}

    function montarDiaAtual() {
      return {
        data: new Date().toLocaleDateString("pt-BR"),
        itens: montarDadosDia()
      };
    }

    async function finalizarDia() {
      const btn = document.getElementById("btnFinalizar");
      const erro = document.getElementById("mensagemErro");

      btn.disabled = true;
      erro.style.display = "none";

      try {
        const ultimo = montarDiaAtual();
        const excel = gerarExcelParaEmail(ultimo);
        await enviarEmailAPI(ultimo, excel);
        alert("Dia Finalizado!");
      } catch (err) {
        console.error(err);
        erro.textContent = err.message || "Nao foi possivel finalizar o dia.";
        erro.style.display = "block";
      } finally {
        btn.disabled = false;
      }
    }

    async function enviarEmailAPI(diaAtual, excel) {
      const resposta = await fetch("https://embalagens-api-rho.vercel.app/api/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          data: diaAtual.data,
          itens: diaAtual.itens,
          excel,
        })
      });

      if (!resposta.ok) {
        throw new Error("Erro ao enviar email. Codigo: " + resposta.status);
      }
    }

    function gerarExcelParaEmail(diaAtual) {
      if (!window.XLSX) {
        throw new Error("Biblioteca XLSX ainda nao carregou. Verifique a internet e tente novamente.");
      }

      const linhas = diaAtual.itens.map(({ item, contagem, diferenca }) => ({
        Dia: diaAtual.data,
        Item: item,
        Contagem: contagem,
        Diferença: diferenca === 0 ? "" : diferenca
      }));

      const ws = XLSX.utils.json_to_sheet(linhas);
      const wb = XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(wb, ws, "Embalagens");

      return {
        nome: "embalagens-cassia.xlsx",
        mimeType: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
        base64: XLSX.write(wb, {
          bookType: "xlsx",
          type: "base64"
        })
      };
    }

        "https://embalagens-api-rho.vercel.app/api/export"
    );

    const blob = await resposta.blob();

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = "Embalagens.xlsx";

    a.click();

    a.remove();

    URL.revokeObjectURL(url);

}

async function finalizarInventario() {

    const inventario = [];

    categoriasInventario.forEach((categoria, indiceCategoria) => {

        categoria.itens.forEach((item, indiceItem) => {

            const id = `${indiceCategoria}_${indiceItem}`;

            inventario.push({

               categoria: categoria.categoria,
                item,
                quantidade: soma(
                    document.getElementById("inv_" + id).value
                )

            });

        });

    });

    try{

        const resposta = await fetch(
            "https://embalagens-api-rho.vercel.app/api/inventario",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    data:new Date().toLocaleDateString("pt-BR"),

                    itens:inventario

                })

            }
        );

        if(!resposta.ok){

            throw new Error();

        }

        alert("Inventário salvo com sucesso!");

        voltarInicioInventario();

    }

    catch{

        alert("Erro ao salvar o inventário.");

    }

}
